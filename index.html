<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Domain For Sale</title>
  <style>
    :root{--bg:#0f1724;--card:#071026;--accent:#ffb86b;--muted:#94a3b8}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);color:#f8fafc;display:flex;min-height:100vh;align-items:center;justify-content:center}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:32px;border-radius:14px;box-shadow:0 8px 40px rgba(2,6,23,0.6);max-width:820px;width:92%;text-align:center}
    h1{margin:0 0 8px;font-size:34px;color:var(--accent)}
    p{margin:0 0 18px;color:var(--muted);font-size:16px}
    .price{font-size:20px;color:#fff;margin-bottom:12px}
    .contact{display:inline-block;background:rgba(255,255,255,0.04);padding:10px 14px;border-radius:10px;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,0.03)}
    footer{margin-top:18px;color:var(--muted);font-size:13px}
    @media (max-width:440px){h1{font-size:26px}}
  </style>
</head>
<body>
  <main class="card">
    <h1>Domain Available for Purchase</h1>
    <p>This domain name is currently for sale.</p>
    <div class="price">Asking price: <strong>Make An Offer in USD</strong></div>
    <a class="contact" href="mailto:buhhgoo-hinkydink@yahoo.com?subject=Domain%20Purchase%20Inquiry">Contact to Buy</a>
  </main>
</body>
</html>
